<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Interactive Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ff6b6b,#ffb347,#6c63ff,#00d4ff);
    background-size:400% 400%;
    animation:gradient 10s ease infinite;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    text-align:center;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.2);
    padding:40px;
    border-radius:25px;
    color:white;
    width:90%;
    max-width:500px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    font-size:2.8rem;
    margin-bottom:10px;
}

p{
    margin-bottom:20px;
    opacity:.9;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-size:1rem;
    font-weight:bold;
    background:white;
    color:#6c63ff;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
}

.emoji{
    font-size:4rem;
    margin:20px 0;
    transition:.3s;
}

.floating{
    position:absolute;
    border-radius:50%;
    pointer-events:none;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(0);
    }
    to{
        transform:translateY(-100px) scale(1);
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>✨ Welcome ✨</h1>
    <p>Click the button and enjoy the colorful magic!</p>

    <div class="emoji" id="emoji">😎</div>

    <button onclick="magic()">Click Me!</button>

    <h3 id="message" style="margin-top:20px;"></h3>
</div>

<script>

const emojis = ["😎","🚀","🌈","🎉","✨","🔥","💖","🦄","🌟","🎨"];
const messages = [
"You're Awesome!",
"Keep Shining!",
"Today is Your Day!",
"Dream Big!",
"Create Something Amazing!",
"Stay Curious!",
"Be Fearless!",
"You Got This!"
];

function magic(){
    document.getElementById("emoji").innerText =
        emojis[Math.floor(Math.random()*emojis.length)];

    document.getElementById("message").innerText =
        messages[Math.floor(Math.random()*messages.length)];

    for(let i=0;i<20;i++){
        createBubble();
    }
}

function createBubble(){
    const bubble=document.createElement("div");
    bubble.classList.add("floating");

    const size=Math.random()*25+10;

    bubble.style.width=size+"px";
    bubble.style.height=size+"px";
    bubble.style.left=Math.random()*window.innerWidth+"px";

    bubble.style.background=
        `hsl(${Math.random()*360},100%,70%)`;

    document.body.appendChild(bubble);

    setTimeout(()=>{
        bubble.remove();
    },8000);
}

document.addEventListener("mousemove",(e)=>{
    const spark=document.createElement("div");
    spark.style.position="absolute";
    spark.style.left=e.pageX+"px";
    spark.style.top=e.pageY+"px";
    spark.style.width="8px";
    spark.style.height="8px";
    spark.style.borderRadius="50%";
    spark.style.background=`hsl(${Math.random()*360},100%,70%)`;
    spark.style.pointerEvents="none";
    spark.style.transition="1s";

    document.body.appendChild(spark);

    setTimeout(()=>{
        spark.style.opacity="0";
        spark.style.transform="scale(3)";
    },10);

    setTimeout(()=>{
        spark.remove();
    },1000);
});

</script>

</body>
</html>
